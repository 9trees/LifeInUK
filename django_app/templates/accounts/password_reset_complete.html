{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <h3 class="card-title mb-3">Password Reset Complete</h3>
        <p class="text-muted">Your password has been set. You can now log in with your new password.</p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100">Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
