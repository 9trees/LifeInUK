{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Create your account</h3>
        <p class="text-muted">You get 30 days of active access from today.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" required minlength="2" value="{{ form.full_name.value|default:'' }}">
            {{ form.full_name.errors }}
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required value="{{ form.email.value|default:'' }}">
            {{ form.email.errors }}
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required minlength="8">
            {{ form.password.errors }}
          </div>
          <button class="btn btn-primary w-100">Create Account</button>
        </form>
        <p class="mt-3 mb-0 text-center">Already registered? <a href="{% url 'accounts:login' %}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
