<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life in the UK Mock Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-orb orb-1"></div>
  <div class="background-orb orb-2"></div>

  <main class="container">
    <header class="hero">
      <h1>Life in the UK Mock Test</h1>
      <p>
        24 questions in 45 minutes. Pass mark: <strong>18/24 (75%)</strong>.
        Topic-balanced question selection every time.
      </p>
      <button id="start-btn" class="btn btn-primary">Start New Mock Test</button>
    </header>

    <section id="status-card" class="card status-card hidden" aria-live="polite">
      <div>
        <p class="label">Time Remaining</p>
        <p id="timer" class="timer">45:00</p>
      </div>
      <div>
        <p class="label">Answered</p>
        <p id="answered-count" class="metric">0 / 24</p>
      </div>
      <div>
        <p class="label">Current Score</p>
        <p id="live-score" class="metric">0</p>
      </div>
      <div class="progress-wrap" aria-hidden="true">
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
        </div>
        <p id="progress-text" class="progress-text">0% completed</p>
      </div>
      <div class="quick-actions">
        <button id="jump-btn" class="btn btn-ghost" type="button">Go To First Unanswered</button>
      </div>
    </section>

    <section id="test-section" class="card hidden">
      <form id="test-form"></form>
      <div class="actions">
        <button id="submit-btn" class="btn btn-accent" type="button">Submit Test</button>
      </div>
    </section>

    <section id="result-section" class="card hidden" aria-live="polite">
      <h2>Results</h2>
      <div id="result-summary" class="result-summary"></div>
      <h3>Performance by Topic</h3>
      <div id="topic-analysis" class="topic-analysis"></div>
      <details id="review-details">
        <summary>Review Answers</summary>
        <div id="answer-review" class="answer-review"></div>
      </details>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
